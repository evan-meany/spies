name: Version + Changelog PR on Merge

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  version-repo:
    # Run only for merged PRs, and skip the auto-release PR to prevent loops
    if: >
      github.event.pull_request.merged == true &&
      !startsWith(github.event.pull_request.title, 'patch: release v')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Determine bump type from PR title
        id: bump
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          if echo "$PR_TITLE" | grep -qiE '^major:'; then
            echo "type=major" >> "$GITHUB_OUTPUT"
          elif echo "$PR_TITLE" | grep -qiE '^minor:'; then
            echo "type=minor" >> "$GITHUB_OUTPUT"
          elif echo "$PR_TITLE" | grep -qiE '^patch:'; then
            echo "type=patch" >> "$GITHUB_OUTPUT"
          else
            echo "type=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute next version
        id: ver
        env:
          BUMP_TYPE: ${{ steps.bump.outputs.type }}
        run: |
          set -euo pipefail

          CURRENT_VERSION=$(tr -d ' \n\r\t' < VERSION)
          if ! echo "$CURRENT_VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "VERSION must be X.Y.Z. Found: '$CURRENT_VERSION'"
            exit 1
          fi

          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"

          case "$BUMP_TYPE" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
            *) echo "Unknown bump type: $BUMP_TYPE"; exit 1 ;;
          esac

          echo "new_version=${MAJOR}.${MINOR}.${PATCH}" >> "$GITHUB_OUTPUT"

      - name: Create release branch + commit VERSION/CHANGELOG
        env:
          NEW_VERSION: ${{ steps.ver.outputs.new_version }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          set -euo pipefail

          BRANCH="release/v${NEW_VERSION}"

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          # Ensure local view of remote refs
          git fetch origin --prune

          # Delete remote branch if it exists (safe for reruns)
          git push origin --delete "$BRANCH" 2>/dev/null || true

          # Create the branch locally from current main
          git switch -c "$BRANCH"

          # This script uses PR_BODY and NEW_VERSION from env
          scripts/make_release_commit.sh

          # Push the branch
          git push -u origin "$BRANCH"

      - name: Open release PR (idempotent)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_VERSION: ${{ steps.ver.outputs.new_version }}
        run: |
          set -euo pipefail

          BRANCH="release/v${NEW_VERSION}"

          # If a PR already exists for this branch, don't fail on rerun
          if gh pr view "$BRANCH" --json number >/dev/null 2>&1; then
            echo "Release PR already exists for $BRANCH"
            exit 0
          fi

          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "patch: release v${NEW_VERSION}" \
            --body "Automated release PR: updates VERSION and CHANGELOG for v${NEW_VERSION}."