name: Version + Tag on PR Merge

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write
  pull-requests: read

jobs:
  tag:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Determine bump type from PR title
        id: bump
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          echo "PR title: $PR_TITLE"

          # Priority: major > minor > patch
          if echo "$PR_TITLE" | grep -qiE "^major:"; then
            echo "type=major" >> $GITHUB_OUTPUT
          elif echo "$PR_TITLE" | grep -qiE "^minor:"; then
            echo "type=minor" >> $GITHUB_OUTPUT
          elif echo "$PR_TITLE" | grep -qiE "^patch:"; then
            echo "type=patch" >> $GITHUB_OUTPUT
          else
            echo "type=patch" >> $GITHUB_OUTPUT
          fi

      - name: Bump VERSION, commit, and tag
        env:
          BUMP_TYPE: ${{ steps.bump.outputs.type }}
        run: |
          set -euo pipefail

          if [ ! -f VERSION ]; then
            echo "VERSION file not found at repo root."
            exit 1
          fi

          CURRENT_VERSION=$(tr -d ' \n\r\t' < VERSION)

          if ! echo "$CURRENT_VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "VERSION must be in X.Y.Z format. Found: '$CURRENT_VERSION'"
            exit 1
          fi

          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"

          case "$BUMP_TYPE" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
            *) echo "Unknown bump type: $BUMP_TYPE"; exit 1 ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "$NEW_VERSION" > VERSION

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add VERSION
          git commit -m "chore: bump version to v$NEW_VERSION [skip ci]"

          git tag "v$NEW_VERSION"
          git push origin main --tags